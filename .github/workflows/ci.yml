name: Python CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Проверка репозитория (Checkout)
      uses: actions/checkout@v3

    - name: Настройка Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Установка системных пакетов
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Установка зависимостей проекта
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Проверка синтаксиса кода линтером (Flake8)
      run: |
        # Остановка сборки, если есть критические ошибки синтаксиса
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Ошибки стилистики выводим как предупреждения (сборка не падает)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics